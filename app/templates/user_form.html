{% extends "_layout.html" %}

{% set title = "Criar Novo Usuário" if action == 'create' else "Editar Usuário" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h2>{{ title }}</h2>

<div class="card mt-4">
    <div class="card-body">
        <form method="POST" action="{{ url_for(request.endpoint, user_id=user.id if user else None) }}">
            <div class="mb-3">
                <label for="name" class="form-label">Nome Completo</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ user.name if user else '' }}"
                    required>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Nome de Usuário (login)</label>
                <input type="text" class="form-control" id="username" name="username"
                    value="{{ user.username if user else '' }}" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" name="password" {% if action=='create'
                    %}required{% endif %}>
                {% if action == 'edit' %}
                <div class="form-text">Deixe em branco para não alterar a senha.</div>
                {% endif %}
            </div>

            <div class="mb-3">
                <label class="form-label d-block">Nível de Acesso</label>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="role_user" value="user" {% if not user
                        or (not user.is_admin and not user.is_supervisor) %}checked{% endif %}>
                    <label class="form-check-label" for="role_user">Usuário Comum</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="role_supervisor" value="supervisor" {%
                        if user and user.is_supervisor %}checked{% endif %}>
                    <label class="form-check-label" for="role_supervisor">Supervisor</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="role" id="role_admin" value="admin" {% if user
                        and user.is_admin %}checked{% endif %}>
                    <label class="form-check-label" for="role_admin">Administrador</label>
                </div>
            </div>

            <div class="d-flex justify-content-end">
                <a href="{{ url_for('manage_users') }}" class="btn btn-secondary me-2">Cancelar</a>
                <button type="submit" class="btn btn-primary">
                    {% if action == 'create' %}
                    Criar Usuário
                    {% else %}
                    Salvar Alterações
                    {% endif %}
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
